<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>To Do List</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #dbe3ef;
      --text: #1f2937;
      --muted: #64748b;
      --brand: #2563eb;
      --ok: #16a34a;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: linear-gradient(180deg, #eaf2ff 0%, var(--bg) 40%, #f8fafc 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }
    .app { width: 100%; max-width: 460px; display: grid; gap: 12px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
    }
    h1 { margin: 0 0 8px; font-size: 22px; }
    .meta { color: var(--muted); font-size: 13px; }
    .input-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    input {
      width: 100%; border: 1px solid var(--line); border-radius: 10px;
      padding: 12px; font-size: 16px; outline: none;
    }
    input:focus { border-color: var(--brand); }
    button {
      border: 0; border-radius: 10px; padding: 10px 14px;
      background: var(--brand); color: #fff; font-weight: 600; font-size: 14px;
    }
    ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 8px; }
    li {
      display: grid; grid-template-columns: auto 1fr auto; gap: 10px; align-items: center;
      border: 1px solid var(--line); border-radius: 10px; padding: 10px;
    }
    .done-text { text-decoration: line-through; color: #94a3b8; }
    .check {
      width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--brand);
      display: grid; place-items: center; cursor: pointer; font-size: 12px;
      color: white; background: white;
    }
    .check.done { background: var(--ok); border-color: var(--ok); }
    .del { background: var(--danger); padding: 8px 10px; font-size: 12px; }
    .footer { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 13px; }
    .ghost { background: #94a3b8; }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>To Do List</h1>
      <div class="meta">本地自动保存，刷新页面也不会丢。</div>
    </section>

    <section class="card">
      <div class="input-row">
        <input id="todoInput" type="text" placeholder="输入待办事项..." maxlength="120" />
        <button id="addBtn">添加</button>
      </div>
    </section>

    <section class="card">
      <ul id="list"></ul>
      <div class="footer" style="margin-top: 10px;">
        <span id="count">0 项</span>
        <button id="clearDone" class="ghost">清除已完成</button>
      </div>
    </section>
  </main>

  <script>
    const KEY = 'ecclaw_todos_v1';
    const input = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('list');
    const count = document.getElementById('count');
    const clearDone = document.getElementById('clearDone');

    let todos = [];

    function save() {
      localStorage.setItem(KEY, JSON.stringify(todos));
    }

    function load() {
      try {
        todos = JSON.parse(localStorage.getItem(KEY) || '[]');
        if (!Array.isArray(todos)) todos = [];
      } catch {
        todos = [];
      }
    }

    function addTodo(text) {
      const value = text.trim();
      if (!value) return;
      todos.unshift({ id: Date.now(), text: value, done: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggleTodo(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function render() {
      list.innerHTML = '';
      todos.forEach(todo => {
        const li = document.createElement('li');

        const check = document.createElement('button');
        check.className = 'check' + (todo.done ? ' done' : '');
        check.textContent = todo.done ? '✓' : '';
        check.addEventListener('click', () => toggleTodo(todo.id));

        const text = document.createElement('div');
        text.textContent = todo.text;
        if (todo.done) text.className = 'done-text';

        const del = document.createElement('button');
        del.className = 'del';
        del.textContent = '删除';
        del.addEventListener('click', () => deleteTodo(todo.id));

        li.appendChild(check);
        li.appendChild(text);
        li.appendChild(del);
        list.appendChild(li);
      });

      const doneCount = todos.filter(t => t.done).length;
      count.textContent = `${todos.length} 项（已完成 ${doneCount}）`;
    }

    addBtn.addEventListener('click', () => addTodo(input.value));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo(input.value);
    });

    clearDone.addEventListener('click', () => {
      todos = todos.filter(t => !t.done);
      save();
      render();
    });

    load();
    render();
  </script>
</body>
</html>
