<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ecClaw Mobile</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --brand: #0ea5e9;
      --brand-2: #22c55e;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef6ff 0%, var(--bg) 42%, #f8fafc 100%);
      min-height: 100dvh;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .app {
      width: 100%;
      max-width: 420px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .hero {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }

    .badge {
      display: inline-block;
      font-size: 12px;
      color: white;
      background: linear-gradient(90deg, var(--brand), #3b82f6);
      padding: 4px 10px;
      border-radius: 999px;
    }

    h1 {
      font-size: 22px;
      line-height: 1.3;
      margin: 12px 0 8px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }

    .card strong {
      display: block;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .btn {
      border: 0;
      width: 100%;
      border-radius: 12px;
      background: linear-gradient(90deg, var(--brand), var(--brand-2));
      color: #fff;
      padding: 12px 14px;
      font-size: 15px;
      font-weight: 600;
      margin-top: 8px;
      cursor: pointer;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      padding-bottom: 8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <span class="badge">HTML5 Mobile</span>
      <h1>欢迎来到 ecClaw 移动页面</h1>
      <p>这个页面已做手机端适配，支持窄屏、触屏和高分辨率设备。</p>
      <button class="btn" onclick="alert('页面运行正常 ✅')">点我测试</button>
    </section>

    <section class="grid">
      <article class="card">
        <strong>响应式</strong>
        <p>视口自适应</p>
      </article>
      <article class="card">
        <strong>轻量</strong>
        <p>纯 HTML + CSS</p>
      </article>
    </section>

    <div class="footer">Built for mobile web preview</div>
  </main>
</body>
</html>
