<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>AI Launch Detail</title>
  <style>
    :root {
      --bg: #f3f4f1;
      --paper: #fffdfa;
      --ink: #171717;
      --muted: #6f6b63;
      --rule: #d8d1c4;
      --accent: #b91c1c;
      --accent-2: #0f766e;
      --soft: #fbf7ef;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      background:
        linear-gradient(90deg, rgba(23, 23, 23, 0.035) 1px, transparent 1px) 0 0 / 18px 18px,
        linear-gradient(180deg, #ede7dc 0%, var(--bg) 52%, #f8f7f2 100%);
      font-family: Georgia, "Times New Roman", "Songti SC", "SimSun", serif;
    }

    .shell {
      width: min(100%, 760px);
      margin: 0 auto;
      background: var(--paper);
      min-height: 100dvh;
      border-left: 1px solid rgba(23, 23, 23, 0.08);
      border-right: 1px solid rgba(23, 23, 23, 0.08);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(255, 253, 250, 0.96);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--ink);
      padding: max(12px, env(safe-area-inset-top)) 16px 10px;
    }

    .masthead {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .brand {
      color: inherit;
      text-decoration: none;
      font-size: clamp(27px, 8vw, 48px);
      line-height: 0.92;
      font-weight: 900;
      text-transform: uppercase;
    }

    .date {
      text-align: right;
      color: var(--muted);
      font: 600 12px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      white-space: nowrap;
    }

    main { padding: 16px 16px 30px; }

    .back {
      display: inline-flex;
      align-items: center;
      border: 1px solid var(--rule);
      background: #fff;
      color: var(--ink);
      padding: 9px 11px;
      margin-bottom: 16px;
      font: 800 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-decoration: none;
    }

    .label {
      display: inline-flex;
      width: fit-content;
      background: var(--accent);
      color: #fff;
      padding: 5px 8px;
      font: 800 11px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-transform: uppercase;
    }

    h1 {
      margin: 12px 0 0;
      font-size: clamp(32px, 9vw, 58px);
      line-height: 1;
    }

    .byline {
      color: var(--muted);
      margin-top: 10px;
      font: 700 12px/1.35 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .hero {
      border-bottom: 2px solid var(--ink);
      padding-bottom: 16px;
      margin-bottom: 16px;
    }

    .summary {
      margin: 12px 0 0;
      color: #34302b;
      font-size: 17px;
      line-height: 1.55;
    }

    .body {
      display: grid;
      gap: 16px;
    }

    .body p {
      margin: 0;
      color: #2d2924;
      font-size: 17px;
      line-height: 1.72;
    }

    .takeaway {
      border-left: 4px solid var(--accent);
      background: var(--soft);
      padding: 12px;
      font: 800 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 4px 0 0;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 6px;
      font: 900 16px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .section-title small {
      color: var(--muted);
      font-weight: 700;
    }

    .impact {
      display: grid;
      gap: 10px;
    }

    .impact-card {
      border-top: 1px solid var(--rule);
      padding-top: 10px;
    }

    .impact-card b {
      display: block;
      margin-bottom: 5px;
      font: 900 13px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--accent-2);
    }

    .impact-card span {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .empty {
      border: 1px solid var(--rule);
      background: var(--soft);
      padding: 14px;
      font: 700 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    footer {
      padding: 18px 16px max(22px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--rule);
      color: var(--muted);
      font: 600 12px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <div class="masthead">
        <a class="brand" href="index.html">AI Launch Radar</a>
        <div class="date">
          <span id="today">Daily</span><br />
          Detail
        </div>
      </div>
    </header>

    <main id="app"></main>

    <footer>
      详情页独立加载，可直接分享链接；后续接入数据库后会按 id 读取真实资讯数据。
    </footer>
  </div>

  <script>
    const stories = [
      {
        id: 'gpt-4o-mini-refresh',
        type: 'model',
        mark: 'M1',
        title: 'GPT-4o mini 能力刷新',
        summary: '面向低成本、高并发场景的轻量模型更新，适合客服、摘要、结构化抽取和移动端助手。',
        meta: ['新模型', 'OpenAI', '低成本'],
        body: [
          '这类轻量模型更新的关键价值不在于刷新最高能力上限，而在于把可用的多模态和文本处理能力压到更低的推理成本区间。',
          '如果后续开放稳定 API 和批量推理价格，它会更适合客服、内容摘要、数据清洗、表单抽取和移动端助手这类高频场景。',
          '需要继续观察的是上下文长度、中文能力、工具调用稳定性和企业级限流策略。'
        ],
        takeaway: '适合关注成本敏感型 AI 应用，尤其是需要大量调用但不要求最强推理的产品。',
        impact: ['开发者：可优先测试摘要、分类、抽取和客服场景。', '企业：关注 API 成本、稳定性和数据合规选项。', '竞品：轻量模型价格会继续压缩中小模型空间。']
      },
      {
        id: 'qwen-coder-agent',
        type: 'model',
        mark: 'M2',
        title: '通义代码模型增强 Agent 能力',
        summary: '代码理解、补全、测试生成和仓库级问答能力增强，重点面向企业研发流程。',
        meta: ['新模型', '阿里通义', '代码'],
        body: [
          '代码模型的竞争正在从单文件补全转向仓库级理解、自动测试、依赖分析和任务拆解。',
          '国内企业使用代码助手时更关心私有化、权限边界、审计日志和与内部研发平台的集成。模型能力增强如果能进入 IDE、CI 和代码评审流程，会比单独聊天窗口更有价值。',
          '后续需要观察它对大型仓库、中文注释、遗留系统和多语言项目的支持程度。'
        ],
        takeaway: '代码模型正在从“写几行代码”转向“参与研发流程”。',
        impact: ['研发团队：适合测试单元测试生成和代码审查辅助。', '云厂商：可通过 IDE 与 DevOps 工具增强绑定。', '创业产品：需要避开纯补全功能同质化。']
      },
      {
        id: 'deepmind-video-agent',
        type: 'model',
        mark: 'M3',
        title: '视频理解模型进入实用测试阶段',
        summary: '多模态模型开始更稳定地理解长视频内容，可用于质检、安防、教育和内容检索。',
        meta: ['新模型', 'Google DeepMind', '多模态'],
        body: [
          '视频理解能力的实用价值在于把原本需要人工观看的内容转成可检索、可总结、可触发工作流的数据。',
          '如果模型能稳定处理长视频、时间轴定位和跨片段推理，它会影响内容平台、企业培训、工业质检和安防分析。',
          '需要谨慎评估误报率、隐私合规和实时处理成本。'
        ],
        takeaway: '视频理解是多模态模型从演示走向行业应用的重要方向。',
        impact: ['内容平台：提升视频搜索和自动标签能力。', '企业客户：关注质检、培训和监控场景。', '监管侧：隐私和安全边界会更敏感。']
      },
      {
        id: 'cursor-team-rules',
        type: 'tool',
        mark: 'T1',
        title: 'Cursor 团队规则与代码库上下文工具更新',
        summary: '面向团队协作的规则配置增强，让 AI 编码助手更容易遵守项目约定。',
        meta: ['新工具', 'Cursor', '开发者'],
        body: [
          'AI 编码工具真正进入团队后，最大问题通常不是会不会写代码，而是能不能稳定遵守项目结构、命名习惯、测试约定和安全边界。',
          '团队规则和代码库上下文能力增强，可以减少重复说明，让助手更像团队成员而不是一次性脚本生成器。',
          '这类工具的关键指标是误改率、上下文召回准确性和对大型仓库的延迟控制。'
        ],
        takeaway: 'AI 编程工具开始补团队工程化短板，而不是只展示生成速度。',
        impact: ['工程团队：适合沉淀项目规则和 review 偏好。', '工具厂商：竞争点转向上下文管理和协作能力。', '安全团队：需要配置权限和敏感文件边界。']
      },
      {
        id: 'notion-ai-workflow',
        type: 'tool',
        mark: 'T2',
        title: 'Notion AI 工作流自动化能力扩展',
        summary: '知识库、任务、会议纪要和项目状态更新开始联动，适合轻量团队运营。',
        meta: ['新工具', 'Notion AI', '办公'],
        body: [
          '办公 AI 的重点正在从单次问答转向跨文档、任务和会议记录的持续协作。',
          '如果工具能自动把会议内容转成任务、同步项目状态、生成周报并保留来源引用，会明显降低团队运营成本。',
          '这类能力需要重点看权限控制、多人协作冲突和生成内容可追溯性。'
        ],
        takeaway: '办公 AI 的价值不在“写得漂亮”，而在减少信息搬运。',
        impact: ['中小团队：适合项目管理和会议纪要自动化。', 'SaaS 厂商：AI 会变成工作流入口。', '企业客户：权限和审计仍是采购门槛。']
      },
      {
        id: 'perplexity-research-mode',
        type: 'tool',
        mark: 'T3',
        title: 'Perplexity 研究模式强化来源追踪',
        summary: '搜索型 AI 工具继续强化引用、来源对比和长问题研究，适合资讯与竞品分析。',
        meta: ['新工具', 'Perplexity', '搜索'],
        body: [
          '搜索型 AI 的核心壁垒是信息新鲜度、来源可信度和答案组织能力，而不是单纯生成文字。',
          '研究模式如果能稳定做多来源交叉验证、时间线整理和观点差异对比，会很适合行业跟踪、竞品分析和投资研究。',
          '仍需注意的是来源覆盖偏差、付费墙内容缺失和中文信息召回质量。'
        ],
        takeaway: 'AI 搜索正在成为资讯筛选层，适合先看结论再回到原始来源核验。',
        impact: ['研究人员：适合做初筛和线索整理。', '媒体产品：会被迫提升结构化和引用体验。', '企业市场：需要更强的私有数据接入能力。']
      }
    ];

    document.getElementById('today').textContent = new Intl.DateTimeFormat('zh-CN', {
      year: 'numeric',
      month: '2-digit',
      day: '2-digit',
      weekday: 'short'
    }).format(new Date());

    const params = new URLSearchParams(window.location.search);
    const item = stories.find(story => story.id === params.get('id'));
    const app = document.getElementById('app');

    if (!item) {
      app.innerHTML = `
        <a class="back" href="index.html">← 返回概览</a>
        <div class="empty">没有找到这条资讯。请回到概览页重新选择。</div>
      `;
    } else {
      document.title = `${item.title} - AI Launch Radar`;
      app.innerHTML = `
        <a class="back" href="index.html">← 返回概览</a>
        <section class="hero">
          <span class="label">${item.type === 'model' ? 'New Model' : 'New Tool'}</span>
          <h1>${item.title}</h1>
          <p class="summary">${item.summary}</p>
          <div class="byline">${item.mark} / ${item.meta.join(' / ')} / ${document.getElementById('today').textContent}</div>
        </section>
        <section class="body">
          <div class="takeaway">${item.takeaway}</div>
          ${item.body.map(paragraph => `<p>${paragraph}</p>`).join('')}
          <div class="section-title">
            <span>使用判断</span>
            <small>Impact</small>
          </div>
          <div class="impact">
            ${item.impact.map(point => {
              const [head, rest] = point.split('：');
              return `<div class="impact-card"><b>${head}</b><span>${rest || point}</span></div>`;
            }).join('')}
          </div>
        </section>
      `;
    }
  </script>
</body>
</html>
